<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro SaaS Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

</head>
<body>

<!-- Login -->
<div class="login" id="loginPage">
  <div class="login-box">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- Dashboard -->
<div class="sidebar hidden" id="sidebar">
  <h2>Dashboard</h2>
  <ul>
    <li onclick="showSection('home')">Home</li>
    <li onclick="showSection('tasks')">Tasks</li>
    <li onclick="showSection('analytics')">Analytics</li>
  </ul>
</div>

<div class="main hidden" id="main">
  <div class="header">
    <h1 id="title">Home</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- Home -->
  <div id="home" class="section">
    <div class="cards">
      <div class="card"><h3>Total Tasks</h3><p id="totalTasks">0</p></div>
      <div class="card"><h3>Completed</h3><p id="completedTasks">0</p></div>
      <div class="card"><h3>Pending</h3><p id="pendingTasks">0</p></div>
    </div>
  </div>

  <!-- Tasks -->
  <div id="tasks" class="section hidden">
    <button class="add-btn" onclick="addTask()">Add Task</button>
    <table>
      <thead>
        <tr><th>Task</th><th>Status</th><th>Action</th></tr>
      </thead>
      <tbody id="taskList"></tbody>
    </table>
  </div>

  <!-- Analytics -->
  <div id="analytics" class="section hidden">
    <h2>Simple Analytics</h2>
    <canvas id="chart" height="100"></canvas>
  </div>
</div>

</body>
</html>
